<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Card Store</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#6366f1;--pri-d:#4f46e5;--pri-l:#a5b4fc;--bg:#f1f5f9;--card:#fff;--txt:#1e293b;--txt2:#64748b;--txt3:#94a3b8;--brd:#e2e8f0;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.1);--sh3:0 10px 25px rgba(0,0,0,.12);--r:12px;--rs:8px;--tr:all .3s ease}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;overflow-x:hidden}
a{color:var(--pri);text-decoration:none}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px}

.navbar{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(79,70,229,.3)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;color:#fff;font-weight:700;font-size:20px}
.nav-logo .icon{font-size:28px}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;transition:var(--tr)}
.nav-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.05)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--err);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.cart-badge.hide{display:none}

.cat-bar{background:#fff;border-bottom:1px solid var(--brd);padding:12px 20px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;display:flex;gap:8px}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{padding:8px 20px;border-radius:20px;border:2px solid var(--brd);background:#fff;color:var(--txt2);font-weight:500;font-size:13px;transition:var(--tr);flex-shrink:0}
.cat-btn:hover{border-color:var(--pri-l);color:var(--pri)}
.cat-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;visibility:hidden;transition:var(--tr)}
.overlay.show{opacity:1;visibility:visible}
.profile-panel{position:fixed;top:0;right:-360px;width:340px;max-width:90vw;height:100%;background:#fff;z-index:201;transition:right .35s ease;box-shadow:var(--sh3);overflow-y:auto}
.profile-panel.show{right:0}
.pp-header{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:30px 24px;color:#fff;text-align:center}
.pp-avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.5);margin:0 auto 12px;object-fit:cover}
.pp-avatar-ph{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.5);margin:0 auto 12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px}
.pp-name{font-size:18px;font-weight:600}
.pp-email{font-size:13px;opacity:.85;margin-top:4px}
.pp-badge{display:inline-block;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;margin-top:8px}
.pp-menu{padding:16px 0}
.pp-item{display:flex;align-items:center;gap:12px;padding:14px 24px;cursor:pointer;transition:var(--tr);font-weight:500;color:var(--txt)}
.pp-item:hover{background:var(--bg)}
.pp-item.danger{color:var(--err)}
.pp-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}

.page{display:none;padding:24px 20px 80px;max-width:1200px;margin:0 auto;min-height:60vh}
.page.active{display:block}
.page-title{font-size:26px;font-weight:700;margin-bottom:24px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.p-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:var(--tr)}
.p-card:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.p-card-img{height:200px;overflow:hidden;background:#f8fafc}
.p-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.p-card:hover .p-card-img img{transform:scale(1.05)}
.p-card-body{padding:16px}
.p-card-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--pri);background:rgba(99,102,241,.08);padding:4px 10px;border-radius:4px;display:inline-block}
.p-card-title{font-size:16px;font-weight:600;margin:10px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-card-price{font-size:18px;font-weight:700;color:var(--pri)}
.p-card-price span{font-size:12px;font-weight:400;color:var(--txt3)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:16px}
.detail-img{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh2);background:#f8fafc}
.detail-img img{width:100%;height:auto;min-height:300px;object-fit:cover}
.detail-title{font-size:28px;font-weight:700;line-height:1.3}
.detail-desc{color:var(--txt2);margin:16px 0 24px;font-size:15px;line-height:1.7}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:12px}
.var-grid{display:flex;flex-wrap:wrap;gap:8px}
.var-btn{padding:10px 18px;border:2px solid var(--brd);border-radius:var(--rs);background:#fff;font-size:14px;font-weight:500;color:var(--txt);transition:var(--tr);cursor:pointer}
.var-btn:hover{border-color:var(--pri-l)}
.var-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.qty-ctrl{display:flex;align-items:center;border:2px solid var(--brd);border-radius:var(--rs);overflow:hidden;width:fit-content}
.qty-btn{width:44px;height:44px;border:none;background:#fff;font-size:20px;font-weight:600;color:var(--txt);transition:var(--tr);cursor:pointer}
.qty-btn:hover{background:var(--bg)}
.qty-val{width:60px;height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;border-left:2px solid var(--brd);border-right:2px solid var(--brd)}
.detail-total{font-size:24px;font-weight:700;color:var(--pri);margin:8px 0 20px}
.cfield{margin-bottom:14px}
.cfield label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.cfield .req{color:var(--err)}
.cfield input,.cfield textarea{width:100%;padding:10px 14px;border:2px solid var(--brd);border-radius:var(--rs);font-size:14px;outline:none;transition:var(--tr)}
.cfield input:focus,.cfield textarea:focus{border-color:var(--pri)}

.btn{padding:12px 28px;border-radius:var(--rs);font-weight:600;font-size:14px;border:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:var(--tr)}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:hover{background:var(--pri-d);transform:translateY(-1px)}
.btn-sec{background:transparent;color:var(--pri);border:2px solid var(--pri)}
.btn-sec:hover{background:rgba(99,102,241,.05)}
.btn-err{background:var(--err);color:#fff}
.btn-err:hover{background:#dc2626}
.btn-sm{padding:8px 16px;font-size:12px}
.btn-lg{padding:16px 36px;font-size:16px;width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.back-btn{background:none;border:none;color:var(--pri);font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:0}

.cart-item{background:#fff;border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--sh);display:flex;gap:16px;align-items:flex-start}
.cart-item-img{width:80px;height:80px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;background:#f8fafc}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:600;font-size:16px;margin-bottom:4px}
.cart-item-var{font-size:13px;color:var(--txt2)}
.cart-item-cf{font-size:12px;color:var(--txt3);margin-top:6px}
.cart-item-cf div{margin-bottom:2px}
.cart-item-right{text-align:right;flex-shrink:0}
.cart-item-price{font-weight:700;font-size:18px;color:var(--pri)}
.cart-item-qty{font-size:13px;color:var(--txt2);margin:4px 0 8px}
.cart-item-rm{background:none;border:none;color:var(--err);font-size:13px;font-weight:600;cursor:pointer}
.cart-summary{background:#fff;border-radius:var(--r);padding:24px;box-shadow:var(--sh);margin-top:20px}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cart-total-label{font-size:18px;font-weight:600}
.cart-total-val{font-size:26px;font-weight:800;color:var(--pri)}

.co-section{background:#fff;border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--sh)}
.co-section h3{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.pm-opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid var(--brd);border-radius:var(--rs);cursor:pointer;transition:var(--tr);margin-bottom:8px}
.pm-opt:hover{border-color:var(--pri-l)}
.pm-opt.active{border-color:var(--pri);background:rgba(99,102,241,.04)}
.pm-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:var(--tr)}
.pm-opt.active .pm-radio{border-color:var(--pri)}
.pm-opt.active .pm-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--pri)}
.pm-info{flex:1;min-width:0}
.pm-info h4{font-weight:600;font-size:15px}
.pm-info p{font-size:13px;color:var(--txt2);margin-top:4px;white-space:pre-wrap}
.qr-box{margin-top:16px;text-align:center;padding:20px;background:#f8fafc;border-radius:var(--rs);border:2px dashed var(--brd);display:none}
.qr-box.show{display:block}
.qr-box img{max-width:250px;max-height:250px;margin:0 auto 12px;border-radius:8px;box-shadow:var(--sh2);background:#fff;padding:8px}
.qr-box .qr-label{font-size:14px;font-weight:600;margin-bottom:4px}
.qr-box .qr-hint{font-size:12px;color:var(--txt3)}

/* UPLOAD AREA */
.upload-area{border:2px dashed var(--brd);border-radius:var(--rs);padding:30px 20px;text-align:center;cursor:pointer;transition:var(--tr);background:#fafbfc;position:relative}
.upload-area:hover{border-color:var(--pri-l);background:#f0f0ff}
.upload-area.dragover{border-color:var(--pri);background:rgba(99,102,241,.05)}
.upload-area.has-file{border-color:var(--ok);background:#f0fdf4}
.upload-icon{font-size:48px;margin-bottom:12px}
.upload-text{font-size:14px;font-weight:600;color:var(--txt2)}
.upload-hint{font-size:12px;color:var(--txt3);margin-top:4px}
.upload-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-preview{margin-top:16px;position:relative;display:none}
.upload-preview.show{display:block}
.upload-preview img{max-width:300px;max-height:200px;margin:0 auto;border-radius:8px;box-shadow:var(--sh2);object-fit:contain;background:#fff}
.upload-preview .file-info{font-size:12px;color:var(--txt3);margin-top:8px}
.upload-preview .remove-file{position:absolute;top:-8px;right:calc(50% - 160px);background:var(--err);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh2)}
.upload-status{margin-top:8px;font-size:13px;font-weight:500}
.upload-status.compressing{color:var(--warn)}
.upload-status.ready{color:var(--ok)}
.upload-status.error{color:var(--err)}

/* SS VIEWER MODAL */
.ss-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
.ss-modal.show{display:flex}
.ss-modal img{max-width:90vw;max-height:85vh;border-radius:var(--rs);box-shadow:var(--sh3);object-fit:contain;background:#fff}
.ss-modal .ss-close{position:fixed;top:20px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ss-modal .ss-close:hover{background:rgba(255,255,255,.3)}

/* ADMIN SS THUMBNAIL */
.ss-thumb{width:60px;height:60px;border-radius:6px;overflow:hidden;cursor:pointer;flex-shrink:0;border:1px solid var(--brd);background:#f8fafc;transition:var(--tr)}
.ss-thumb:hover{transform:scale(1.1);box-shadow:var(--sh2)}
.ss-thumb img{width:100%;height:100%;object-fit:cover}

.order-card{background:#fff;border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--sh)}
.order-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--brd)}
.order-id{font-weight:700;font-size:15px}
.order-date{font-size:13px;color:var(--txt3)}
.status{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;display:inline-block}
.status-Pending{background:#fef3c7;color:#92400e}
.status-Approved{background:#d1fae5;color:#065f46}
.status-Rejected{background:#fee2e2;color:#991b1b}
.oi-row{padding:10px 0;border-bottom:1px solid var(--brd)}
.oi-row:last-child{border:none}
.oi-name{font-weight:600}
.oi-detail{font-size:13px;color:var(--txt2);margin-top:2px}
.order-total{display:flex;justify-content:space-between;font-weight:700;font-size:18px;padding-top:12px;border-top:2px solid var(--brd)}
.order-pay{margin:12px 0;font-size:13px;color:var(--txt2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.order-pay a,.order-pay button{color:var(--pri);font-weight:600}
.o-status-sel{padding:8px 12px;border:2px solid var(--brd);border-radius:var(--rs);font-size:13px;font-weight:500;outline:none;cursor:pointer}

.atabs{display:flex;gap:4px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;border-bottom:2px solid var(--brd)}
.atabs::-webkit-scrollbar{display:none}
.atab{padding:12px 20px;border:none;background:transparent;font-weight:600;font-size:14px;color:var(--txt2);border-bottom:3px solid transparent;cursor:pointer;transition:var(--tr);white-space:nowrap;margin-bottom:-2px}
.atab:hover{color:var(--pri)}
.atab.active{color:var(--pri);border-bottom-color:var(--pri)}
.acard{background:#fff;border-radius:var(--r);padding:24px;box-shadow:var(--sh);margin-bottom:16px}
.acard h3{font-size:18px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--txt2)}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:2px solid var(--brd);border-radius:var(--rs);font-size:14px;outline:none;transition:var(--tr)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri)}
.fg textarea{resize:vertical;min-height:80px}
.ali{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:8px;background:#fafbfc}
.ali .nm{font-weight:500}
.drow{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.drow input,.drow select{flex:1;min-width:100px;padding:8px 12px;border:2px solid var(--brd);border-radius:var(--rs);font-size:13px;outline:none}
.drow input:focus,.drow select:focus{border-color:var(--pri)}
.drow .rbtn{width:36px;height:36px;border:none;background:var(--err);color:#fff;border-radius:var(--rs);font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.chkl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.chkl input[type="checkbox"]{width:auto;margin:0}
.api{display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:8px;background:#fafbfc;flex-wrap:wrap}
.api-thumb{width:60px;height:60px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg)}
.api-thumb img{width:100%;height:100%;object-fit:cover}
.api-info{flex:1;min-width:150px}
.api-info h4{font-weight:600;font-size:15px}
.api-info p{font-size:12px;color:var(--txt2)}

.apm-item{display:flex;align-items:flex-start;gap:16px;padding:16px;border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:10px;background:#fafbfc;flex-wrap:wrap}
.apm-qr{width:80px;height:80px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#f8fafc;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center}
.apm-qr img{width:100%;height:100%;object-fit:contain;padding:4px}
.apm-qr .noqr{font-size:10px;color:var(--txt3);text-align:center;padding:4px}
.apm-info{flex:1;min-width:150px}
.apm-info h4{font-weight:600;font-size:15px;margin-bottom:4px}
.apm-info p{font-size:12px;color:var(--txt3);line-height:1.5}

.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty h3{font-size:20px;font-weight:600;color:var(--txt2);margin-bottom:8px}
.empty p{font-size:14px}

.toast-c{position:fixed;top:80px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#fff;padding:14px 24px;border-radius:var(--rs);font-size:14px;font-weight:500;box-shadow:var(--sh3);animation:tIn .3s ease;max-width:360px}
.toast.success{border-left:4px solid var(--ok)}
.toast.error{border-left:4px solid var(--err)}
.toast.info{border-left:4px solid var(--pri)}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:var(--r);padding:40px;max-width:400px;width:100%;text-align:center;box-shadow:var(--sh3)}
.modal h2{font-size:24px;font-weight:700;margin-bottom:8px}
.modal p{color:var(--txt2);margin-bottom:28px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;border:2px solid var(--brd);border-radius:var(--rs);background:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:var(--tr)}
.gbtn:hover{background:#f8fafc;border-color:var(--txt3)}
.gbtn svg{width:20px;height:20px;flex-shrink:0}

.load-ov{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.load-ov.show{display:flex}
.spinner{width:48px;height:48px;border:4px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;color:var(--txt2);font-weight:500}

.footer{background:#1e293b;color:#fff;text-align:center;padding:24px;font-size:13px;margin-top:40px}
.flex-b{display:flex;justify-content:space-between;align-items:center}
.mt-2{margin-top:16px}.mb-1{margin-bottom:8px}

.dbar{background:#fef3c7;border:1px solid #fbbf24;padding:10px 20px;font-size:12px;color:#92400e;display:none;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.dbar.show{display:flex}

// IMAGE COMPRESSION
function compressImage(file,maxW,maxH,quality,callback){
maxW=maxW||800;maxH=maxH||600;quality=quality||0.6;
var reader=new FileReader();
reader.onload=function(e){
var img=new Image();
img.onload=function(){
var w=img.width,h=img.height;
if(w>maxW){h=h*(maxW/w);w=maxW}
if(h>maxH){w=w*(maxH/h);h=maxH}
var canvas=document.createElement('canvas');
canvas.width=w;canvas.height=h;
var ctx=canvas.getContext('2d');
ctx.drawImage(img,0,0,w,h);
var base64=canvas.toDataURL('image/jpeg',quality);
callback(base64);
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
}

function setupDragDrop(){

var files=e.dataTransfer.files;if(files.length>0)processFile(files[0])});
}

function handleFileUpload(input){

function processFile(file){
// Validate file type
if(!file.type.startsWith('image/')){toast('Please upload an image file','error');return}
// Validate file size (5MB max)
if(file.size>5*1024*1024){toast('File too large. Max 5MB','error');return}

var status=document.getElementById('uploadStatus');
var preview=document.getElementById('uploadPreview');
var previewImg=document.getElementById('uploadPreviewImg');
var fileInfo=document.getElementById('fileInfo');
var area=document.getElementById('uploadArea');

status.className='upload-status compressing';
status.textContent='⏳ Compressing image...';

// Compress and convert to base64
compressImage(file,800,600,0.5,function(base64){
uploadedSS=base64;

// Show preview
previewImg.src=base64;
preview.classList.add('show');
area.classList.add('has-file');

// File info
var sizeMB=(file.size/1024/1024).toFixed(2);
var compressedSize=(base64.length/1024/1024).toFixed(2);
fileInfo.textContent=file.name+' • Original: '+sizeMB+'MB → Compressed: '+compressedSize+'MB';

status.className='upload-status ready';
status.textContent='✅ Screenshot ready! Image compressed successfully.';

toast('Screenshot uploaded!','success');
});
}

function removeUpload(){
uploadedSS='';
var preview=document.getElementById('uploadPreview');
var status=document.getElementById('uploadStatus');
var area=document.getElementById('uploadArea');
var input=document.getElementById('ssFileInput');

preview.classList.remove('show');
area.classList.remove('has-file');
status.textContent='';
if(input)input.value='';
toast('Screenshot removed','info');
}

function selPM(id){selPMId=id;document.querySelectorAll('.pm-opt').forEach(function(e){e.classList.remove('active')});var s=document.getElementById('pmo-'+id);if(s)s.classList.add('active');var pm=pms[id],qb=document.getElementById('qrBox'),qi=document.getElementById('qrImg'),ql=document.getElementById('qrLbl');if(pm&&pm.qrImage&&pm.qrImage.trim()){qb.classList.add('show');qi.src=pm.qrImage;ql.textContent='Scan QR for '+pm.name}else qb.classList.remove('show')}

function placeOrd(){if(!U){showLogin();return}if(!cart.length){toast('Cart empty','error');return}

if(!selPMId||!pms[selPMId]){toast('Select payment method','error');return}

for(var i=0;i<cart.length;i++){var c=cart[i];oi.push({productId:c.productId,productName:c.productName,productImage:c.productImage,variantName:c.variantName,variantPrice:c.variantPrice,quantity:c.quantity,customFields:c.customFields||{},totalPrice:c.totalPrice})}
var ord={userId:U.uid,userName:U.displayName||'',userEmail:U.email||'',items:oi,totalPrice:gTotal(),paymentMethod:pm.name,paymentScreenshot:uploadedSS,status:'Pending',createdAt:firebase.database.ServerValue.TIMESTAMP};
showL('Placing order...');var btn=document.getElementById('poBtn');if(btn)btn.disabled=true;
db.ref('orders').push(ord).then(function(){cart=[];saveC();updBadge();uploadedSS='';hideL();toast('Order placed!','success');go('orders')}).catch(function(e){hideL();if(btn)btn.disabled=false;toast('Error: '+e.message,'error')})}

function renderOrds(){var e=document.getElementById('ordC');if(!U){e.innerHTML='<div class="empty"><div class="empty-icon">🔐</div><h3>Sign In</h3><button class="btn btn-pri mt-2" onclick="showLogin()">Sign In</button></div>';return}
e.innerHTML='<div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>';
db.ref('orders').orderByChild('userId').equalTo(U.uid).once('value').then(function(s){procOrds(e,s.val())}).catch(function(){
db.ref('orders').once('value').then(function(s){var all=s.val()||{},f={};for(var k in all)if(all.hasOwnProperty(k)&&all[k].userId===U.uid)f[k]=all[k];procOrds(e,Object.keys(f).length?f:null)}).catch(function(e2){e.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><h3>Error</h3><p>'+esc(e2.message)+'</p><button class="btn btn-pri mt-2" onclick="renderOrds()">Retry</button></div>'})})}

function procOrds(e,orders){if(!orders){e.innerHTML='<div class="empty"><div class="empty-icon">📦</div><h3>No Orders</h3><button class="btn btn-pri mt-2" onclick="go(\'home\')">Shop</button></div>';return}
var ents=[];for(var oid in orders)if(orders.hasOwnProperty(oid))ents.push({id:oid,d:orders[oid]});ents.sort(function(a,b){return(b.d.createdAt||0)-(a.d.createdAt||0)});var h='';for(var i=0;i<ents.length;i++)h+=ordCard(ents[i].id,ents[i].d,false);e.innerHTML=h}

function ordCard(oid,o,adm){var dt='N/A';if(o.createdAt){var d=new Date(o.createdAt);dt=d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
var ih='';if(o.items)for(var j=0;j<o.items.length;j++){var it=o.items[j],fh='';if(it.customFields&&Object.keys(it.customFields).length){var pts=[];for(var k in it.customFields)if(it.customFields.hasOwnProperty(k))pts.push('<strong>'+esc(k)+':</strong> '+esc(it.customFields[k]));fh='<div class="oi-detail" style="margin-top:4px;font-size:12px">'+pts.join(' | ')+'</div>'}
ih+='<div class="oi-row"><div class="oi-name">'+esc(it.productName)+'</div><div class="oi-detail">'+esc(it.variantName)+' × '+it.quantity+' = '+fmtP(it.totalPrice)+'</div>'+fh+'</div>'}
var ch='';if(adm)ch='<div style="margin-bottom:12px;font-size:14px;padding:10px;background:#f8fafc;border-radius:8px"><strong>👤</strong> '+esc(o.userName||'')+' | <strong>📧</strong> '+esc(o.userEmail||'')+'</div>';
var sh='';if(adm)sh='<div style="display:flex;align-items:center;gap:12px;margin-top:12px"><label style="font-weight:600;font-size:13px">Status:</label><select class="o-status-sel" onchange="updOS(\''+oid+'\',this.value)"><option value="Pending"'+(o.status==='Pending'?' selected':'')+'>⏳ Pending</option><option value="Approved"'+(o.status==='Approved'?' selected':'')+'>✅ Approved</option><option value="Rejected"'+(o.status==='Rejected'?' selected':'')+'>❌ Rejected</option></select></div>';

// Screenshot - handle both base64 and URL
var ssHtml='';
if(o.paymentScreenshot){
var isBase64=o.paymentScreenshot.indexOf('data:image')===0;
if(isBase64){
ssHtml='<div class="order-pay"><strong>Payment:</strong> '+esc(o.paymentMethod||'N/A')+' &nbsp;|&nbsp; '+
'<div class="ss-thumb" onclick="viewSS(\''+oid+'\')"><img src="'+o.paymentScreenshot.substring(0,100)+'..." onerror="imgE(this)"></div>'+
'<button style="background:none;border:none;cursor:pointer;color:var(--pri);font-weight:600;font-size:13px" onclick="viewSS(\''+oid+'\')">📷 View Screenshot</button></div>';
}else{
ssHtml='<div class="order-pay"><strong>Payment:</strong> '+esc(o.paymentMethod||'N/A')+' &nbsp;|&nbsp; <a href="'+esc(o.paymentScreenshot)+'" target="_blank">📷 View Screenshot</a></div>';
}
}else{
ssHtml='<div class="order-pay"><strong>Payment:</strong> '+esc(o.paymentMethod||'N/A')+'</div>';
}

return'<div class="order-card"><div class="order-header"><span class="order-id">📋 #'+oid.slice(-8).toUpperCase()+'</span><span class="order-date">'+dt+'</span><span class="status status-'+(o.status||'Pending')+'">'+esc(o.status||'Pending')+'</span></div>'+ch+'<div style="margin-bottom:12px">'+ih+'</div>'+ssHtml+'<div class="order-total"><span>Total</span><span style="color:var(--pri)">'+fmtP(o.totalPrice)+'</span></div>'+sh+'</div>'}

// Store screenshot data for viewer
var ssCache={};
function cacheSSData(oid,data){ssCache[oid]=data}

// Override viewSS to load from DB
function viewSS(oid){
if(ssCache[oid]){
document.getElementById('ssModalImg').src=ssCache[oid];
document.getElementById('ssModal').classList.add('show');
document.body.style.overflow='hidden';
return;
}
showL('Loading screenshot...');
db.ref('orders/'+oid+'/paymentScreenshot').once('value').then(function(s){
var data=s.val();
if(data){
ssCache[oid]=data;
document.getElementById('ssModalImg').src=data;
document.getElementById('ssModal').classList.add('show');
document.body.style.overflow='hidden';
}else toast('Screenshot not found','error');
hideL();
}).catch(function(e){hideL();toast('Error: '+e.message,'error')});
}

switch(t){case'categories':rACats(e);break;case'products':rAProds(e);break;case'payments':rAPMs(e);break;case'orders':rAOrds(e);break}}

function rACats(e){var ck=Object.keys(cats),lh='';for(var i=0;i<ck.length;i++)lh+='<div class="ali"><span class="nm">'+esc(cats[ck[i]].name)+'</span><button class="btn btn-err btn-sm" onclick="delCat(\''+ck[i]+'\')">🗑</button></div>';
if(!lh)lh='<p style="color:var(--txt3);text-align:center;padding:20px">No categories.</p>';
e.innerHTML='<div class="acard"><h3>➕ Add Category</h3><div style="display:flex;gap:8px"><input type="text" id="acN" placeholder="Category name" style="flex:1;padding:10px 14px;border:2px solid var(--brd);border-radius:var(--rs);outline:none"><button class="btn btn-pri" onclick="addCat()">Add</button></div></div><div class="acard"><h3>📂 Categories ('+ck.length+')</h3>'+lh+'</div>'}

function rAProds(e){var pk=Object.keys(prods),lh='';for(var i=0;i<pk.length;i++){var id=pk[i],p=prods[id],vc=p.variants?Object.keys(p.variants).length:0;lh+='<div class="api"><div class="api-thumb"><img src="'+esc(p.image||PH)+'" onerror="imgE(this)"></div><div class="api-info"><h4>'+esc(p.name)+'</h4><p>'+esc(catN(p.category))+' • '+vc+' var • '+fmtP(startP(p))+'</p></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="btn btn-sec btn-sm" onclick="edProd(\''+id+'\')">✏️</button><button class="btn btn-err btn-sm" onclick="delProd(\''+id+'\')">🗑</button></div></div>'}
if(!lh)lh='<p style="color:var(--txt3);text-align:center;padding:20px">No products.</p>';
var co='<option value="">-- Select --</option>';for(var c in cats)if(cats.hasOwnProperty(c))co+='<option value="'+c+'">'+esc(cats[c].name)+'</option>';
e.innerHTML='<div class="acard" id="pFC"><h3>'+(editPid?'✏️ Edit':'➕ Add')+' Product</h3><div class="fg"><label>Name *</label><input type="text" id="apN" placeholder="Name"></div><div class="fg"><label>Description</label><textarea id="apD" rows="3"></textarea></div><div class="fg"><label>Category *</label><select id="apC">'+co+'</select></div><div class="fg"><label>Image URL</label><input type="url" id="apI" placeholder="https://..."></div><div class="fg"><div class="flex-b mb-1"><label style="margin:0">Variants *</label><button class="btn btn-sec btn-sm" onclick="addVR()">+ Add</button></div><div id="vRows"></div></div><div class="fg"><div class="flex-b mb-1"><label style="margin:0">Custom Fields</label><button class="btn btn-sec btn-sm" onclick="addCR()">+ Add</button></div><div id="cRows"></div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-pri" onclick="saveProd()">'+(editPid?'Update':'Save')+'</button>'+(editPid?'<button class="btn btn-sec" onclick="canEd()">Cancel</button>':'')+'</div></div><div class="acard"><h3>📦 Products ('+pk.length+')</h3>'+lh+'</div>';
if(editPid&&prods[editPid])popPF(prods[editPid]);else addVR()}
function addVR(n,p){var c=document.getElementById('vRows');if(!c)return;var d=document.createElement('div');d.className='drow';d.innerHTML='<input type="text" placeholder="Variant name" value="'+esc(n||'')+'"><input type="number" placeholder="Price" value="'+(p||'')+'" min="0"><button class="rbtn" onclick="this.parentElement.remove()">✕</button>';c.appendChild(d)}
function addCR(l,t,r){var c=document.getElementById('cRows');if(!c)return;var d=document.createElement('div');d.className='drow';d.innerHTML='<input type="text" placeholder="Label" value="'+esc(l||'')+'"><select><option value="text"'+(t==='text'||!t?' selected':'')+'>Text</option><option value="number"'+(t==='number'?' selected':'')+'>Number</option><option value="textarea"'+(t==='textarea'?' selected':'')+'>Textarea</option></select><label class="chkl"><input type="checkbox"'+(r?' checked':'')+' > Req</label><button class="rbtn" onclick="this.parentElement.remove()">✕</button>';c.appendChild(d)}
function popPF(p){document.getElementById('apN').value=p.name||'';document.getElementById('apD').value=p.description||'';document.getElementById('apC').value=p.category||'';document.getElementById('apI').value=p.image||'';var vr=document.getElementById('vRows');if(vr){vr.innerHTML='';if(p.variants)for(var k in p.variants)if(p.variants.hasOwnProperty(k))addVR(p.variants[k].name,p.variants[k].price);if(!p.variants||!Object.keys(p.variants).length)addVR()}var cr=document.getElementById('cRows');if(cr){cr.innerHTML='';if(p.customFields)for(var fk in p.customFields)if(p.customFields.hasOwnProperty(fk)){var f=p.customFields[fk];addCR(f.label,f.type,f.required)}}}
function saveProd(){var n=document.getElementById('apN').value.trim(),d=document.getElementById('apD').value.trim(),c=document.getElementById('apC').value,im=document.getElementById('apI').value.trim();if(!n){toast('Name required','error');return}if(!c){toast('Select category','error');return}
var vrs=document.getElementById('vRows').querySelectorAll('.drow'),vs={},hv=false;for(var i=0;i<vrs.length;i++){var ins=vrs[i].querySelectorAll('input'),vn=ins[0].value.trim(),vp=parseFloat(ins[1].value);if(vn&&!isNaN(vp)&&vp>=0){vs[gid()]={name:vn,price:vp};hv=true}}if(!hv){toast('Add variant','error');return}
var crs=document.getElementById('cRows').querySelectorAll('.drow'),cfs={};for(var j=0;j<crs.length;j++){var row=crs[j],lb=row.querySelector('input[type="text"]').value.trim();if(lb)cfs[gid()]={label:lb,type:row.querySelector('select').value||'text',required:row.querySelector('input[type="checkbox"]').checked}}
var prod={name:n,description:d,category:c,image:im,variants:vs,customFields:cfs};showL();
(editPid?db.ref('products/'+editPid).update(prod):db.ref('products').push().set(prod)).then(function(){hideL();toast(editPid?'Updated!':'Added!','success');editPid=null;swATab('products')}).catch(function(e){hideL();toast(e.message,'error')})}
function edProd(id){editPid=id;rAProds(document.getElementById('adminC'));setTimeout(function(){var c=document.getElementById('pFC');if(c)c.scrollIntoView({behavior:'smooth'})},100)}
function canEd(){editPid=null;swATab('products')}
function delProd(id){if(!confirm('Delete?'))return;db.ref('products/'+id).remove().then(function(){toast('Deleted','info');if(editPid===id)editPid=null})}

function rAPMs(e){var pk=Object.keys(pms),lh='';for(var i=0;i<pk.length;i++){var id=pk[i],pm=pms[id];var qt=pm.qrImage&&pm.qrImage.trim()?'<div class="apm-qr"><img src="'+esc(pm.qrImage)+'" onerror="imgE(this)"></div>':'<div class="apm-qr"><div class="noqr">No QR</div></div>';
lh+='<div class="apm-item">'+qt+'<div class="apm-info"><h4>💰 '+esc(pm.name)+'</h4><p>'+esc(pm.instructions||'')+'</p></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="btn btn-sec btn-sm" onclick="edPM(\''+id+'\')">✏️</button><button class="btn btn-err btn-sm" onclick="delPM(\''+id+'\')">🗑</button></div></div>'}
if(!lh)lh='<p style="color:var(--txt3);text-align:center;padding:20px">None.</p>';
e.innerHTML='<div class="acard" id="pmFC"><h3 id="pmFT">➕ Add Payment Method</h3><div class="fg"><label>Name *</label><input type="text" id="apmN" placeholder="e.g. eSewa"></div><div class="fg"><label>Instructions</label><textarea id="apmI" rows="3"></textarea></div><div class="fg"><label>QR Code Image Link</label><input type="url" id="apmQ" placeholder="https://..."></div><div id="qrPrev" style="display:none;text-align:center;margin-bottom:16px;padding:16px;background:#f8fafc;border-radius:8px"><img id="qrPI" style="max-width:150px;margin:0 auto;border-radius:8px;box-shadow:var(--sh)" onerror="imgE(this)"></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-pri" onclick="savePM()" id="pmSB">Add</button><button class="btn btn-sec" onclick="prevQR()">👁 Preview</button><span id="pmCW"></span></div></div><div class="acard"><h3>💰 Payment Methods ('+pk.length+')</h3>'+lh+'</div>'}
function prevQR(){var u=document.getElementById('apmQ').value.trim();if(u){document.getElementById('qrPI').src=u;document.getElementById('qrPrev').style.display='block'}else toast('Enter QR link','info')}
function savePM(){var nE=document.getElementById('apmN'),n=nE.value.trim();if(!n){toast('Enter name','error');return}
var d={name:n,instructions:document.getElementById('apmI').value.trim(),qrImage:document.getElementById('apmQ').value.trim()};showL();
(editPMId?db.ref('paymentMethods/'+editPMId).update(d):db.ref('paymentMethods').push().set(d)).then(function(){hideL();toast(editPMId?'Updated!':'Added!','success');editPMId=null;swATab('payments')}).catch(function(e){hideL();toast(e.message,'error')})}
function edPM(id){editPMId=id;var pm=pms[id];if(!pm)return;rAPMs(document.getElementById('adminC'));setTimeout(function(){document.getElementById('apmN').value=pm.name||'';document.getElementById('apmI').value=pm.instructions||'';document.getElementById('apmQ').value=pm.qrImage||'';document.getElementById('pmFT').textContent='✏️ Edit';document.getElementById('pmSB').textContent='Update';document.getElementById('pmCW').innerHTML='<button class="btn btn-sec" onclick="canPMEd()">Cancel</button>';if(pm.qrImage){document.getElementById('qrPI').src=pm.qrImage;document.getElementById('qrPrev').style.display='block'}var c=document.getElementById('pmFC');if(c)c.scrollIntoView({behavior:'smooth'})},100)}
function canPMEd(){editPMId=null;swATab('payments')}
function delPM(id){if(!confirm('Delete?'))return;db.ref('paymentMethods/'+id).remove().then(function(){toast('Deleted','info');if(editPMId===id)editPMId=null})}

function rAOrds(e){e.innerHTML='<div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>';
db.ref('orders').once('value').then(function(s){var ords=s.val();if(!ords){e.innerHTML='<div class="empty"><div class="empty-icon">📦</div><h3>No Orders</h3></div>';return}
var ents=[];for(var oid in ords)if(ords.hasOwnProperty(oid))ents.push({id:oid,d:ords[oid]});ents.sort(function(a,b){return(b.d.createdAt||0)-(a.d.createdAt||0)});
var tot=ents.length,pnd=0,apv=0,rej=0;for(var i=0;i<ents.length;i++){var st=ents[i].d.status;if(st==='Approved')apv++;else if(st==='Rejected')rej++;else pnd++}
var h='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px"><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--pri)">'+tot+'</div><div style="font-size:12px;color:var(--txt3)">Total</div></div><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--warn)">'+pnd+'</div><div style="font-size:12px;color:var(--txt3)">Pending</div></div><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--ok)">'+apv+'</div><div style="font-size:12px;color:var(--txt3)">Approved</div></div><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--err)">'+rej+'</div><div style="font-size:12px;color:var(--txt3)">Rejected</div></div></div>';
for(var j=0;j<ents.length;j++)h+=ordCard(ents[j].id,ents[j].d,true);e.innerHTML=h}).catch(function(err){e.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><h3>Error</h3><p>'+esc(err.message)+'</p></div>'})}

function updOS(oid,st){db.ref('orders/'+oid+'/status').set(st).then(function(){toast('→ '+st,'success');if(curPg==='admin'&&aTab==='orders')rAOrds(document.getElementById('adminC'))}).catch(function(e){toast(e.message,'error')})}

updBadge();renderCB();renderProds();hideL();
</script>
