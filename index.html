<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKTC</title>
    <link rel="icon" href="logoapp.png" type="x-box">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --pri: #4f46e5;
            --pri-d: #4f46e5;
            --pri-l: #a5b4fc;
            --bg: #f9fafb;
            --card: #fff;
            --txt: #1e293b;
            --txt2: #64748b;
            --txt3: #94a3b8;
            --brd: #e2e8f0;
            --ok: #10b981;
            --warn: #ef4444;
            --err: #ef4444;
            --sh: 0 1px 3px rgba(0, 0, 0, .08);
            --sh2: 0 4px 12px rgba(0, 0, 0, .1);
            --sh3: 0 10px 25px rgba(0, 0, 0, .12);
            --r: 12px;
            --rs: 8px;
            --tr: all .3s ease
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--txt);
            line-height: 1.6;
            overflow-x: hidden
        }

        a {
            color: var(--pri);
            text-decoration: none
        }

        img {
            max-width: 100%;
            display: block
        }

        button {
            cursor: pointer;
            font-family: inherit
        }

        input,
        select,
        textarea {
            font-family: inherit;
            font-size: 14px
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(79, 70, 229, .3)
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #fff;
            font-weight: 700;
            font-size: 20px
        }

        .nav-logo .icon {
            font-size: 28px
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .nav-btn {
            background: rgba(255, 255, 255, .15);
            border: none;
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
            transition: var(--tr)
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, .25);
            transform: scale(1.05)
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--err);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px
        }

        .cart-badge.hide {
            display: none
        }

        .cat-bar {
            background: #fff;
            border-bottom: 1px solid var(--brd);
            padding: 12px 20px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: flex;
            gap: 8px
        }

        .cat-bar::-webkit-scrollbar {
            display: none
        }

        .cat-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid var(--brd);
            background: #fff;
            color: var(--txt2);
            font-weight: 500;
            font-size: 13px;
            transition: var(--tr);
            flex-shrink: 0
        }

        .cat-btn:hover {
            border-color: var(--pri-l);
            color: var(--pri)
        }

        .cat-btn.active {
            background: var(--pri);
            color: #fff;
            border-color: var(--pri)
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: var(--tr)
        }

        .overlay.show {
            opacity: 1;
            visibility: visible
        }

        .profile-panel {
            position: fixed;
            top: 0;
            right: -360px;
            width: 340px;
            max-width: 90vw;
            height: 100%;
            background: #fff;
            z-index: 201;
            transition: right .35s ease;
            box-shadow: var(--sh3);
            overflow-y: auto
        }

        .profile-panel.show {
            right: 0
        }

        .pp-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            padding: 30px 24px;
            color: #fff;
            text-align: center
        }

        .pp-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, .5);
            margin: 0 auto 12px;
            object-fit: cover
        }

        .pp-avatar-ph {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, .5);
            margin: 0 auto 12px;
            background: rgba(255, 255, 255, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px
        }

        .pp-name {
            font-size: 18px;
            font-weight: 600
        }

        .pp-email {
            font-size: 13px;
            opacity: .85;
            margin-top: 4px
        }

        .pp-badge {
            display: inline-block;
            background: rgba(255, 255, 255, .2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px
        }

        .pp-menu {
            padding: 16px 0
        }

        .pp-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            cursor: pointer;
            transition: var(--tr);
            font-weight: 500;
            color: var(--txt)
        }

        .pp-item:hover {
            background: var(--bg)
        }

        .pp-item.danger {
            color: var(--err)
        }

        .pp-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, .2);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer
        }

        .page {
            display: none;
            padding: 24px 20px 80px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 60vh
        }

        .page.active {
            display: block
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px
        }

        .p-card {
            background: #fff;
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--sh);
            cursor: pointer;
            transition: var(--tr)
        }

        .p-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--sh2)
        }

        .p-card-img {
            height: 200px;
            overflow: hidden;
            background: #f8fafc
        }

        .p-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .4s ease
        }

        .p-card:hover .p-card-img img {
            transform: scale(1.05)
        }

        .p-card-body {
            padding: 16px
        }

        .p-card-cat {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--pri);
            background: rgba(99, 102, 241, .08);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block
        }

        .p-card-title {
            font-size: 16px;
            font-weight: 600;
            margin: 10px 0 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .p-card-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--pri)
        }

        .p-card-price span {
            font-size: 12px;
            font-weight: 400;
            color: var(--txt3)
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 16px
        }

        .detail-img {
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--sh2);
            background: #f8fafc
        }

        .detail-img img {
            width: 100%;
            height: auto;
            min-height: 300px;
            object-fit: cover
        }

        .detail-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3
        }

        .detail-desc {
            color: var(--txt2);
            margin: 16px 0 24px;
            font-size: 15px;
            line-height: 1.7
        }

        .detail-section {
            margin-bottom: 24px
        }

        .detail-section h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--txt2);
            margin-bottom: 12px
        }

        .var-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        .var-btn {
            padding: 10px 18px;
            border: 2px solid var(--brd);
            border-radius: var(--rs);
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            color: var(--txt);
            transition: var(--tr);
            cursor: pointer
        }

        .var-btn:hover {
            border-color: var(--pri-l)
        }

        .var-btn.active {
            background: var(--pri);
            color: #fff;
            border-color: var(--pri)
        }

        .qty-ctrl {
            display: flex;
            align-items: center;
            border: 2px solid var(--brd);
            border-radius: var(--rs);
            overflow: hidden;
            width: fit-content
        }

        .qty-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: #fff;
            font-size: 20px;
            font-weight: 600;
            color: var(--txt);
            cursor: pointer;
            transition: var(--tr)
        }

        .qty-btn:hover {
            background: var(--bg)
        }

        .qty-val {
            width: 60px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            border-left: 2px solid var(--brd);
            border-right: 2px solid var(--brd)
        }

        .detail-total {
            font-size: 24px;
            font-weight: 700;
            color: var(--pri);
            margin: 8px 0 20px
        }

        .cfield {
            margin-bottom: 14px
        }

        .cfield label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px
        }

        .cfield .req {
            color: var(--err)
        }

        .cfield input,
        .cfield textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--brd);
            border-radius: var(--rs);
            font-size: 14px;
            outline: none;
            transition: var(--tr)
        }

        .cfield input:focus,
        .cfield textarea:focus {
            border-color: var(--pri)
        }

        .btn {
            padding: 12px 28px;
            border-radius: var(--rs);
            font-weight: 600;
            font-size: 14px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--tr)
        }

        .btn-pri {
            background: var(--pri);
            color: #fff
        }

        .btn-pri:hover {
            background: var(--pri-d);
            transform: translateY(-1px)
        }

        .btn-sec {
            background: transparent;
            color: var(--pri);
            border: 2px solid var(--pri)
        }

        .btn-sec:hover {
            background: rgba(99, 102, 241, .05)
        }

        .btn-err {
            background: var(--err);
            color: #fff
        }

        .btn-err:hover {
            background: #dc2626
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px
        }

        .btn-lg {
            padding: 16px 36px;
            font-size: 16px;
            width: 100%
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none !important
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--pri);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            padding: 0
        }

        .cart-item {
            background: #fff;
            border-radius: var(--r);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--sh);
            display: flex;
            gap: 16px;
            align-items: flex-start
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            border-radius: var(--rs);
            overflow: hidden;
            flex-shrink: 0;
            background: #f8fafc
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .cart-item-info {
            flex: 1;
            min-width: 0
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px
        }

        .cart-item-var {
            font-size: 13px;
            color: var(--txt2)
        }

        .cart-item-cf {
            font-size: 12px;
            color: var(--txt3);
            margin-top: 6px
        }

        .cart-item-cf div {
            margin-bottom: 2px
        }

        .cart-item-right {
            text-align: right;
            flex-shrink: 0
        }

        .cart-item-price {
            font-weight: 700;
            font-size: 18px;
            color: var(--pri)
        }

        .cart-item-qty {
            font-size: 13px;
            color: var(--txt2);
            margin: 4px 0 8px
        }

        .cart-item-rm {
            background: none;
            border: none;
            color: var(--err);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer
        }

        .cart-summary {
            background: #fff;
            border-radius: var(--r);
            padding: 24px;
            box-shadow: var(--sh);
            margin-top: 20px
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px
        }

        .cart-total-label {
            font-size: 18px;
            font-weight: 600
        }

        .cart-total-val {
            font-size: 26px;
            font-weight: 800;
            color: var(--pri)
        }

        .co-section {
            background: #fff;
            border-radius: var(--r);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--sh)
        }

        .co-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--brd)
        }

        .pm-opt {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border: 2px solid var(--brd);
            border-radius: var(--rs);
            cursor: pointer;
            transition: var(--tr);
            margin-bottom: 8px
        }

        .pm-opt:hover {
            border-color: var(--pri-l)
        }

        .pm-opt.active {
            border-color: var(--pri);
            background: rgba(99, 102, 241, .04)
        }

        .pm-radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--brd);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            transition: var(--tr)
        }

        .pm-opt.active .pm-radio {
            border-color: var(--pri)
        }

        .pm-opt.active .pm-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--pri)
        }

        .pm-info {
            flex: 1;
            min-width: 0
        }

        .pm-info h4 {
            font-weight: 600;
            font-size: 15px
        }

        .pm-info p {
            font-size: 13px;
            color: var(--txt2);
            margin-top: 4px;
            white-space: pre-wrap
        }

        .qr-box {
            margin-top: 16px;
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: var(--rs);
            border: 2px dashed var(--brd);
            display: none
        }

        .qr-box.show {
            display: block
        }

        .qr-box img {
            max-width: 250px;
            max-height: 250px;
            margin: 0 auto 12px;
            border-radius: 8px;
            box-shadow: var(--sh2);
            background: #fff;
            padding: 8px
        }

        .qr-box .qr-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px
        }

        .qr-box .qr-hint {
            font-size: 12px;
            color: var(--txt3)
        }

        /* UPLOAD */
        .upload-zone {
            border: 2px dashed var(--brd);
            border-radius: var(--rs);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--tr);
            background: #fafbfc;
            position: relative
        }

        .upload-zone:hover {
            border-color: var(--pri-l);
            background: #f0f0ff
        }

        .upload-zone.dragover {
            border-color: var(--pri);
            background: rgba(99, 102, 241, .06)
        }

        .upload-zone.has-file {
            border-color: var(--ok);
            background: #f0fdf4
        }

        .upload-zone.uploading {
            border-color: var(--warn);
            background: #fffbeb;
            pointer-events: none
        }

        .upload-zone .uz-icon {
            font-size: 48px;
            margin-bottom: 12px
        }

        .upload-zone .uz-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--txt2)
        }

        .upload-zone .uz-hint {
            font-size: 12px;
            color: var(--txt3);
            margin-top: 4px
        }

        .upload-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%
        }

        .upload-preview {
            margin-top: 16px;
            position: relative;
            display: none;
            text-align: center
        }

        .upload-preview.show {
            display: block
        }

        .upload-preview img {
            max-width: 300px;
            max-height: 200px;
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: var(--sh2);
            object-fit: contain
        }

        .upload-preview .file-info {
            font-size: 12px;
            color: var(--txt3);
            margin-top: 8px
        }

        .upload-preview .file-url {
            font-size: 11px;
            color: var(--pri);
            word-break: break-all;
            margin-top: 4px;
            display: block
        }

        .upload-preview .rm-file {
            position: absolute;
            top: -8px;
            right: calc(50% - 160px);
            background: var(--err);
            color: #fff;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--sh2)
        }

        .upload-bar {
            height: 6px;
            background: var(--brd);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
            display: none
        }

        .upload-bar.show {
            display: block
        }

        .upload-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pri), var(--ok));
            border-radius: 3px;
            transition: width .3s ease;
            width: 0
        }

        .upload-status {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 500
        }

        .upload-status.uploading {
            color: var(--warn)
        }

        .upload-status.done {
            color: var(--ok)
        }

        .upload-status.fail {
            color: var(--err)
        }

        /* SS MODAL */
        .ss-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 400;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .ss-modal.show {
            display: flex
        }

        .ss-modal img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: var(--rs);
            box-shadow: var(--sh3);
            object-fit: contain;
            background: #fff
        }

        .ss-modal .ss-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(8px);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .order-card {
            background: #fff;
            border-radius: var(--r);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--sh)
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--brd)
        }

        .order-id {
            font-weight: 700;
            font-size: 15px
        }

        .order-date {
            font-size: 13px;
            color: var(--txt3)
        }

        .status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block
        }

        .status-Pending {
            background: #fef3c7;
            color: #92400e

        // ========================================
        // IMGBB UPLOAD FUNCTION
        // ========================================
        function uploadToImgBB(file, onProgress, onSuccess, onError) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var base64 = e.target.result.split(',')[1];
                var formData = new FormData();
                formData.append('key', IMGBB_KEY);
                formData.append('image', base64);
                formData.append('name', 'gcs_' + Date.now());

                var xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://api.imgbb.com/1/upload');

                xhr.upload.onprogress = function(ev) {
                    if (ev.lengthComputable && onProgress) {
                        var pct = Math.round((ev.loaded / ev.total) * 100);
                        onProgress(pct);
                    }
                };

                xhr.onload = function() {
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            if (res.success && res.data) {
                                onSuccess(res.data.display_url || res.data.url, res.data);
                            } else {
                                onError('Upload failed: ' + (res.error ? res.error.message : 'Unknown'));
                            }
                        } catch (ex) {
                            onError('Invalid response from ImgBB');
                        }
                    } else {
                        onError('Upload failed with status ' + xhr.status);
                    }
                };

                xhr.onerror = function() {
                    onError('Network error during upload');
                };
                xhr.send(formData);
            };
            reader.onerror = function() {
                onError('Failed to read file');
            };
            reader.readAsDataURL(file);
        }

        function handleSS(file) {
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                toast('Image files only', 'error');
                return

            if (file.size > 10 * 1024 * 1024) {
                toast('Max 10MB', 'error');
                return
            }

            var zone = document.getElementById('uzSS'),
                bar = document.getElementById('ssBar'),
                fill = document.getElementById('ssBarFill'),
                status = document.getElementById('ssStatus');
            zone.classList.add('uploading');
            zone.classList.remove('has-file');
            bar.classList.add('show');
            fill.style.width = '0%';
            status.className = 'upload-status uploading';
            status.textContent = 'Uploading';

            uploadToImgBB(file,
                function(pct) {
                    fill.style.width = pct + '%'
                },
                function(url, data) {
                    ssURL = url;
                    zone.classList.remove('uploading');
                    zone.classList.add('has-file');
                    bar.classList.remove('show');
                    status.className = 'upload-status done';
                    status.textContent = '✅ Uploaded successfully!';
                    document.getElementById('ssImg').src = url;
                    document.getElementById('ssInfo').textContent = file.name + ' • ' + (file.size / 1024 / 1024).toFixed(2) + 'MB';
                    document.getElementById('ssLink').href = url;
                    document.getElementById('ssLink').textContent = url;
                    document.getElementById('ssPrev').classList.add('show');
                    toast('Screenshot uploaded!', 'success');
                },
                function(err) {
                    zone.classList.remove('uploading');
                    bar.classList.remove('show');
                    status.className = 'upload-status fail';
                    status.textContent = '❌ ' + err;
                    toast('Upload failed: ' + err, 'error');
                })
        }

                });

            });

        function ordCard(oid, o, adm) {
            var dt = 'N/A';
            if (o.createdAt) {
                var d = new Date(o.createdAt);
                dt = d.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                }) + ' ' + d.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                })
            }
            var ih = '';
            if (o.items)
                for (var j = 0; j < o.items.length; j++) {
                    var it = o.items[j],
                        fh = '';
                    if (it.customFields && Object.keys(it.customFields).length) {
                        var pts = [];
                        for (var k in it.customFields)
                            if (it.customFields.hasOwnProperty(k)) pts.push('<strong>' + esc(k) + ':</strong> ' + esc(it.customFields[k]));
                        fh = '<div class="oi-detail" style="font-size:12px;margin-top:4px">' + pts.join(' | ') + '</div>'
                    }
                    ih += '<div class="oi-row"><div class="oi-name">' + esc(it.productName) + '</div><div class="oi-detail">' + esc(it.variantName) + ' × ' + it.quantity + ' = ' + fmtP(it.totalPrice) + '</div>' + fh + '</div>'
                }
            var ch = '';
            if (adm) ch = '<div style="margin-bottom:12px;padding:10px;background:#f8fafc;border-radius:8px;font-size:14px"><strong>👤</strong> ' + esc(o.userName || '') + ' | <strong>📧</strong> ' + esc(o.userEmail || '') + '</div>';
            var sh = '';
            if (adm) sh = '<div style="display:flex;align-items:center;gap:12px;margin-top:12px"><label style="font-weight:600;font-size:13px">Status:</label><select class="o-status-sel" onchange="updOS(\'' + oid + '\',this.value)"><option value="Pending"' + (o.status === 'Pending' ? ' selected' : '') + '>⏳ Pending</option><option value="Approved"' + (o.status === 'Approved' ? ' selected' : '') + '>✅ Approved</option><option value="Rejected"' + (o.status === 'Rejected' ? ' selected' : '') + '>❌ Rejected</option></select></div>';
            var ssH = '<div class="order-pay"><strong>Payment:</strong> ' + esc(o.paymentMethod || 'N/A');
            if (o.paymentScreenshot && o.paymentScreenshot.startsWith('http')) {
                ssH += ' <div class="ss-thumb" onclick="viewSS(\'' + esc(o.paymentScreenshot) + '\')"><img src="' + esc(o.paymentScreenshot) + '" onerror="imgE(this)"></div> <button class="view-ss-btn" onclick="viewSS(\'' + esc(o.paymentScreenshot) + '\')">📷 View</button>'
            }
            ssH += '</div>';
            return '<div class="order-card"><div class="order-header"><span class="order-id">📋 #' + oid.slice(-8).toUpperCase() + '</span><span class="order-date">' + dt + '</span><span class="status status-' + (o.status || 'Pending') + '">' + esc(o.status || 'Pending') + '</span></div>' + ch + '<div style="margin-bottom:12px">' + ih + '</div>' + ssH + '<div class="order-total"><span>Total</span><span style="color:var(--pri)">' + fmtP(o.totalPrice) + '</span></div>' + sh + '</div>'

        function handleQRUpload(file) {
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                toast('Image only', 'error');
                return
            }
            if (file.size > 10 * 1024 * 1024) {
                toast('Max 10MB', 'error');
                return
            }

            var bar = document.getElementById('qrBar'),
                fill = document.getElementById('qrBarFill'),
                status = document.getElementById('qrStatus');
            bar.classList.add('show');
            fill.style.width = '0%';
            status.className = 'upload-status uploading';
            status.textContent = '⏳ Uploading QR...';

            uploadToImgBB(file,
                function(pct) {
                    fill.style.width = pct + '%'
                },
                function(url) {
                    adminQRUrl = url;
                    document.getElementById('apmQ').value = url;
                    bar.classList.remove('show');
                    status.className = 'upload-status done';
                    status.textContent = '✅ QR uploaded!';
                    document.getElementById('qrPI').src = url;
                    document.getElementById('qrPrev').style.display = 'block';
                    toast('QR uploaded!', 'success');
                },
                function(err) {
                    bar.classList.remove('show');
                    status.className = 'upload-status fail';
                    status.textContent = '❌ ' + err;
                    toast('QR upload failed', 'error');
                })
        }

                var ords = s.val();

                    e.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><h3>No Orders</h3></div>';
                    return
                }
                var ents = [];
                for (var oid in ords)
                    if (ords.hasOwnProperty(oid)) ents.push({
                        id: oid,
                        d: ords[oid]
                    });
                ents.sort(function(a, b) {
                    return (b.d.createdAt || 0) - (a.d.createdAt || 0)
                });
                var tot = ents.length,
                    pnd = 0,
                    apv = 0,
                    rej = 0;
                for (var i = 0; i < ents.length; i++) {
                    var st = ents[i].d.status;

                    else if (st === 'Rejected') rej++;
                    else pnd++
                }
                var h = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px"><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--pri)">' + tot + '</div><div style="font-size:12px;color:var(--txt3)">Total</div></div><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--warn)">' + pnd + '</div><div style="font-size:12px;color:var(--txt3)">Pending</div></div><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--ok)">' + apv + '</div><div style="font-size:12px;color:var(--txt3)">Approved</div></div><div style="background:#fff;padding:16px;border-radius:8px;text-align:center;box-shadow:var(--sh)"><div style="font-size:28px;font-weight:800;color:var(--err)">' + rej + '</div><div style="font-size:12px;color:var(--txt3)">Rejected</div></div></div>';
                for (var j = 0; j < ents.length; j++) h += ordCard(ents[j].id, ents[j].d, true);
                e.innerHTML = h
            }).catch(function(err) {
                e.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Error</h3><p>' + esc(err.message) + '</p></div>'
            })
        }

        function updOS(oid, st) {
            db.ref('orders/' + oid + '/status').set(st).then(function() {
                toast('→ ' + st, 'success');
                if (curPg === 'admin' && aTab === 'orders') rAOrds(document.getElementById('adminC'))
            }).catch(function(e) {
                toast(e.message, 'error')
            })
        }

        updBadge();
        renderCB();
        renderProds();
        hideL();
    </script>
</body>

</html>
